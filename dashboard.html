<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة الإحصائيات</title>

<style>

body{
font-family:Tahoma;
margin:0;
background:linear-gradient(180deg,#4c1d95,#1e3a8a);
color:white;
direction:rtl;
}

/* الهيدر */
.header{
text-align:center;
padding:25px;
}

.header h1{
color:#ffd54f;
}

/* كارت الطالبة */
.card{
background:rgba(255,255,255,0.08);
margin:15px;
padding:15px;
border-radius:15px;
}

/* الاسم */
.name{
color:#ffd54f;
font-size:20px;
margin-bottom:10px;
}

/* الاحصائيات */
.stats{
display:flex;
gap:10px;
justify-content:space-between;
}

.stat{
background:#6d28d9;
flex:1;
padding:10px;
border-radius:10px;
text-align:center;
}

.stat span{
font-size:22px;
display:block;
}

/* شريط الانضباط */
.progress{
background:#5b21b6;
height:8px;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.progress div{
height:100%;
background:gold;
width:0%;
}

/* الأزرار */
.buttons{
display:flex;
justify-content:space-between;
padding:20px;
gap:10px; /* تقليل المسافة */
}

button{
border:none;
padding:12px 20px;
border-radius:25px;
font-size:16px;
cursor:pointer;
}

.home{
background:orange;
}

.prev{
background:#9333ea;
color:white;
padding:16px 30px; /* تكبير زر السابق */
font-size:18px;
}

</style>
</head>

<body>

<div class="header">
📊
<h1>لوحة الإحصائيات الشاملة</h1>
<p>إحصائيات جميع الطالبات</p>
</div>

<div class="card">

<div class="name" id="studentName">
الطالبة
</div>

<div class="stats">

<div class="stat">
<span id="late">0</span>
متأخر
</div>

<div class="stat">
<span id="early">0</span>
مبكر
</div>

<div class="stat">
<span id="present">0</span>
حضور
</div>

</div>

<p style="margin-top:10px;">نسبة الانضباط</p>

<div class="progress">
<div id="disciplineBar"></div>
</div>

<p id="percentText">0%</p>

</div>

<!-- الأزرار -->
<div class="buttons">

<button class="home" onclick="goHome()">
🏠 الصفحة الرئيسية
</button>

<button class="prev" onclick="goPrev()">
السابق
</button>

</div>

<script>

/* اسم الطالبة من login */
let name = localStorage.getItem("studentName");

if(name){
document.getElementById("studentName").innerText=name;
}

/* ✅ قراءة بيانات الحضور من attendance */
let present =
parseInt(localStorage.getItem("present")) || 0;

let early =
parseInt(localStorage.getItem("early")) || 0;

let late =
parseInt(localStorage.getItem("late")) || 0;

/* عرض القيم */
document.getElementById("present").innerText=present;
document.getElementById("early").innerText=early;
document.getElementById("late").innerText=late;

/* حساب الانضباط */
let total = present + early + late;

let percent = 0;

if(total>0){
percent = Math.round(
((present+early)/total)*100
);
}

document.getElementById("disciplineBar")
.style.width=percent+"%";

document.getElementById("percentText")
.innerText=percent+"%";

/* الصفحة الرئيسية */
function goHome(){
window.location.href="index.html";
}

/* السابق */
function goPrev(){
window.location.href="impect.html";
}

</script>

</body>
</html>
