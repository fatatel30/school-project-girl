<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إحصائيات الطالبات</title>
<style>
body{
font-family:Tahoma;
background:linear-gradient(135deg,#5f1eb6,#1f3c88);
color:white;
text-align:center;
padding:20px;
}
.card{
background:rgba(255,255,255,0.1);
margin:15px;
padding:20px;
border-radius:20px;
}
.box{
display:inline-block;
width:90px;
height:100px;
margin:10px;
background:linear-gradient(#a64bf4,#6a1bb9);
border-radius:20px;
padding-top:20px;
font-size:18px;
color:white;
}

/* ===== الأزرار ===== */
.buttons{
margin-top:40px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
}

.btn{
padding:12px 25px;
border-radius:30px;
font-size:18px;
font-weight:bold;
text-decoration:none;
}

.home{
background:#ffd700;
color:black;
}

.prev{
background:#8e44ad;
color:white;
}
</style>
</head>
<body>

<h2>📊 إحصائيات الطالبات</h2>
<div id="data"></div>

<script>
let url = "https://docs.google.com/spreadsheets/d/1T71_MTXMFzDj8g-BRrq6MxL44q7zZojxlfxbRuoQgyo/export?format=csv";

fetch(url)
.then(res => res.text())
.then(text => {
  let rows = text.trim().split("\n").slice(1);
  let students = {};

  rows.forEach(row => {
    let cols = row.split(",");
    let rawName = cols[1] || "";
    let type = cols[2] || "";

    let name = rawName.trim().toLowerCase();
    name = name.charAt(0).toUpperCase() + name.slice(1);

    if(!students[name]){
      students[name] = {present:0, early:0, late:0};
    }

    if(type.includes("حضور")) students[name].present++;
    if(type.includes("مبكر")) students[name].early++;
    if(type.includes("متأخر")) students[name].late++;
  });

  let container = document.getElementById("data");

  for(let name in students){
    let p = students[name].present;
    let e = students[name].early;
    let l = students[name].late;
    let total = p + e + l;
    let percent = total === 0 ? 0 : Math.round(((p + e) / total) * 100);
    let badges = Math.floor(percent / 20);

    container.innerHTML += `
      <div class="card">
        <h3>${name}</h3>
        <div class="box">${p}<br>حضور</div>
        <div class="box">${e}<br>مبكر</div>
        <div class="box">${l}<br>متأخر</div>
        <h4>نسبة الانضباط: ${percent}%</h4>
        <h4>⭐ الشارات: ${badges}</h4>
      </div>
    `;
  }
});
</script>

<!-- ===== الأزرار ===== -->
<div class="buttons">
  <a href="index.html" class="btn home">🏠 الصفحة الرئيسية</a>
  <a href="impect.html" class="btn prev">السابق</a>
</div>

</body>
</html>
