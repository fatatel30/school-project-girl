<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إحصائيات</title>

<style>
body{
margin:0;
padding-bottom:80px;
font-family:Tahoma;
background:linear-gradient(135deg,#5f1eb6,#1f3c88);
color:white;
text-align:center;
font-weight:bold;
}

.container{padding:20px;}

h1{color:#ffd700;}

.subtitle{color:#ddd;margin-bottom:25px;}

.studentBox{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
margin-bottom:25px;
text-align:right;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
margin-top:15px;
}

.card{
padding:15px;
border-radius:15px;
background:linear-gradient(135deg,#6a2db5,#8a42d8);
text-align:center;
}

.number{
font-size:26px;
margin:8px 0;
}

.progressBg{
background:rgba(255,255,255,0.2);
height:12px;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.progress{
height:100%;
background:#f6b100;
}

.percent{
margin-top:6px;
font-size:14px;
}

/* ===== الأزرار السفلية ===== */

.bottomButtons{
position:fixed;
bottom:0;
right:0;
left:0;
background:rgba(0,0,0,0.3);
display:flex;
justify-content:space-between;
padding:12px 20px;
backdrop-filter:blur(6px);
}

.navBtn{
background:#ffd700;
border:none;
padding:12px 20px;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.totalBox{
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:15px;
margin-bottom:20px;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 لوحة الإحصائيات الشاملة</h1>
<p class="subtitle">إحصائيات جميع الطالبات</p>

<div id="totalStudents" class="totalBox">
إجمالي التسجيلات: 0
</div>

<div id="studentsContainer"></div>

</div>

<script>

/* =========================
   جلب جميع الطالبات
========================= */

let students =
JSON.parse(localStorage.getItem("students")) || {};

let container =
document.getElementById("studentsContainer");

/* إجمالي التسجيلات */
document.getElementById("totalStudents").innerHTML =
"إجمالي التسجيلات: " +
Object.keys(students).length;


/* لو لا توجد بيانات */
if(Object.keys(students).length===0){
container.innerHTML="<h3>لا توجد بيانات بعد</h3>";
}


/* =========================
   إنشاء بطاقة لكل طالبة
========================= */

for(let name in students){

let s = students[name];

let present = s.present || 0;
let early   = s.early || 0;
let late    = s.late || 0;
let badges  = s.badges || 0;

let total = present + early + late;

let percent = 0;

if(total>0){
percent =
Math.round(((present+early)/total)*100);
}

container.innerHTML += `

<div class="studentBox">

<h2>${name}</h2>

<div class="cards">

<div class="card">
<div class="number">${late}</div>
متأخر
</div>

<div class="card">
<div class="number">${early}</div>
مبكر
</div>

<div class="card">
<div class="number">${present+early}</div>
حضور
</div>

</div>

<div class="percent">
${percent}% نسبة الانضباط
</div>

<div class="progressBg">
<div class="progress"
style="width:${percent}%">
</div>
</div>

<br>
🎖️ الشارات: ${badges}

</div>

`;
}

</script>

<!-- أزرار التنقل -->
<div class="bottomButtons">

<button class="navBtn"
onclick="location.href='impect.html'">
السابق
</button>

<button class="navBtn"
onclick="location.href='index.html'">
🏠
</button>

</div>

</body>
</html>
