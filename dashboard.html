<body>

<div class="container">

<h1>📊 لوحة الإحصائيات الشاملة</h1>
<p class="subtitle">إحصائيات جميع الطالبات</p>

<div id="totalStudents" class="totalBox">
إجمالي التسجيلات: 0
</div>

<div id="studentsContainer"></div>

</div>

<script>

/* =========================
   جلب جميع الطالبات
========================= */

let students =
JSON.parse(localStorage.getItem("students")) || {};

let container =
document.getElementById("studentsContainer");

/* إجمالي التسجيلات */
document.getElementById("totalStudents").innerHTML =
"إجمالي التسجيلات: " +
Object.keys(students).length;


/* لو لا توجد بيانات */
if(Object.keys(students).length===0){
container.innerHTML="<h3>لا توجد بيانات بعد</h3>";
}


/* =========================
   إنشاء بطاقة لكل طالبة
========================= */

for(let name in students){

let s = students[name];

let present = s.present || 0;
let early   = s.early || 0;
let late    = s.late || 0;
let badges  = s.badges || 0;

let total = present + early + late;

let percent = 0;

if(total>0){
percent =
Math.round(((present+early)/total)*100);
}

container.innerHTML += `

<div class="studentBox">

<h2>${name}</h2>

<div class="cards">

<div class="card">
<div class="number">${late}</div>
متأخر
</div>

<div class="card">
<div class="number">${early}</div>
مبكر
</div>

<div class="card">
<div class="number">${present+early}</div>
حضور
</div>
<div class="card">
   <div class="number">
      <span id="studentsCount">0</span>
   </div>
   عدد الطالبات
 </div>
<div class="percent">
${percent}% نسبة الانضباط
</div>

<div class="progressBg">
<div class="progress"
style="width:${percent}%">
</div>
</div>

<br>
🎖️ الشارات: ${badges}

</div>

`;
}

</script>

   <div id="students"></div>

<script>
let url = "https://docs.google.com/spreadsheets/d/1T71_MTXMFzDj8g-BRrq6MxL44q7zZojxlfxbRuoQgyo/export?format=csv";

fetch(url)
.then(res => res.text())
.then(data => {

let rows = data.split("\n").slice(1);
let result = {};

rows.forEach(row => {
    let cols = row.split(",");
    let name = (cols[1] || "").trim().toLowerCase();
    let status = cols[2] || "";

    if(!name) return;

    name = name.charAt(0).toUpperCase() + name.slice(1);

    if(!result[name]){
        result[name] = {present:0, early:0, late:0};
    }

    if(status.includes("حضور")) result[name].present++;
    if(status.includes("مبكر")) result[name].early++;
    if(status.includes("متأخر")) result[name].late++;
});

let container = document.getElementById("students");

for(let name in result){
    let s = result[name];

    container.innerHTML += `
        <div style="background:#6a1bb9;color:white;padding:15px;margin:15px;border-radius:15px;">
            <h3>${name}</h3>
            حضور: ${s.present} <br>
            مبكر: ${s.early} <br>
            متأخر: ${s.late}
        </div>
    `;
}

});
</script>
  <script>
let url = "https://docs.google.com/spreadsheets/d/1T71_MTXMFzDj8g-BRrq6MxL44q7zZojxlfxbRuoQgyo/export?format=csv";

fetch(url)
.then(res => res.text())
.then(text => {
  let rows = text.trim().split("\n").slice(1);
  let students = {};

  rows.forEach(row => {
    let cols = row.split(",");
    let rawName = cols[1] || "";
    let type = cols[2] || "";

    let name = rawName.trim().toLowerCase();
    name = name.charAt(0).toUpperCase() + name.slice(1);

    if(!students[name]){
      students[name] = {present:0, early:0, late:0};
    }

    if(type.includes("حضور")) students[name].present++;
    if(type.includes("مبكر")) students[name].early++;
    if(type.includes("متأخر")) students[name].late++;
  });

  let container = document.getElementById("data");

  for(let name in students){
    let p = students[name].present;
    let e = students[name].early;
    let l = students[name].late;
    let total = p + e + l;
    let percent = total === 0 ? 0 : Math.round(((p + e) / total) * 100);
    let badges = Math.floor(percent / 20);

    container.innerHTML += `
      <div class="card">
        <h3>${name}</h3>
        <div class="box">${p}<br>حضور</div>
        <div class="box">${e}<br>مبكر</div>
        <div class="box">${l}<br>متأخر</div>
        <h4>نسبة الانضباط: ${percent}%</h4>
        <h4>⭐ الشارات: ${badges}</h4>
      </div>
    `;
  }
});
</script>
