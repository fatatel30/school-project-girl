<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إحصائيات الطالبات</title>

<style>
body{
font-family:Tahoma;
background:linear-gradient(135deg,#5f1eb6,#1f3c88);
color:white;
text-align:center;
padding:20px;
padding-bottom:100px;
margin:0;
}

.card{
background:rgba(255,255,255,0.1);
margin:15px;
padding:20px;
border-radius:20px;
}

.box{
display:inline-block;
width:90px;
height:100px;
margin:10px;
background:linear-gradient(#a64bf4,#6a1bb9);
border-radius:20px;
padding-top:20px;
font-size:18px;
color:white;
}

.buttons{
position:fixed;
bottom:0;
right:0;
left:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(5px);
}

.btn{
padding:12px 25px;
border-radius:30px;
font-size:18px;
font-weight:bold;
text-decoration:none;
}

.home{
background:#ffd700;
color:black;
}

.prev{
background:#8e44ad;
color:white;
}
</style>
</head>
<body>

<h2>📊 إحصائيات الطالبات</h2>
<div id="data"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDL5aF9Jos192Bb1lJq25xbTrF9EcZ-XSQ",
  authDomain: "school-project-girl.firebaseapp.com",
  databaseURL: "https://school-project-girl-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "school-project-girl",
  storageBucket: "school-project-girl.firebasestorage.app",
  messagingSenderId: "60130160811",
  appId: "1:60130160811:web:e37db48f546fa10895c7ee"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const studentsRef = ref(db, "students");

onValue(studentsRef, (snapshot) => {
  const data = snapshot.val();
  const container = document.getElementById("data");
  container.innerHTML = "";

  if(!data) return;

  for(let name in data){

    let student = data[name];

    let p = student.present || 0;
    let e = student.early || 0;
    let l = student.late || 0;

    let total = p + e + l;
    let percent = total === 0 ? 0 : Math.round(((p + e) / total) * 100);
    let badges = Math.floor(percent / 20);

    container.innerHTML += `
      <div class="card">
        <h3>${name}</h3>
        <div class="box">${p}<br>حضور</div>
        <div class="box">${e}<br>مبكر</div>
        <div class="box">${l}<br>متأخر</div>
        <h4>نسبة الانضباط: ${percent}%</h4>
        <h4>⭐ الشارات: ${badges}</h4>
      </div>
    `;
  }
});
</script>

<div class="buttons">
  <a href="index.html" class="btn home">🏠 الصفحة الرئيسية</a>
  <a href="impect.html" class="btn prev">السابق</a>
</div>

</body>
</html>
