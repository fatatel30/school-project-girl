<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الحضور</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo', sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#5b21b6,#1e3a8a);
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:40px;
color:white;
}

.container{
width:100%;
max-width:420px;
text-align:center;
padding:0 20px;
}

.icon{font-size:45px;margin-bottom:10px;}
h1{color:#facc15;margin-bottom:5px;}
.subtitle{opacity:.9;margin-bottom:20px;}
.status-title{margin:20px 0;font-size:18px;}

.options{
display:flex;
justify-content:space-between;
gap:10px;
margin-bottom:20px;
}

.card{
flex:1;
background:rgba(255,255,255,0.08);
padding:18px 10px;
border-radius:18px;
cursor:pointer;
transition:.3s;
}

.card.active{
background:linear-gradient(135deg,#3b82f6,#2563eb);
box-shadow:0 0 20px #60a5fa;
transform:scale(1.05);
}

.card .emoji{font-size:35px;margin-bottom:8px;}
.card span{display:block;font-size:15px;}

.late{color:#facc15;}
.present{color:#86efac;}
.early{color:#fde047;}

.nav{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.next,.back{
padding:12px 28px;
border:none;
border-radius:25px;
font-weight:bold;
cursor:pointer;
}

.next{background:#facc15;color:#4b0082;}
.back{background:#9333ea;color:white;}
</style>
</head>

<body>

<div class="container">

<div class="icon">📋</div>
<h1>تسجيل الحضور</h1>
<div class="subtitle" id="welcomeText"></div>

<div class="status-title">حالة الحضور اليوم:</div>

<div class="options">

<div class="card" onclick="selectStatus(this,'late')">
<div class="emoji">⏰</div>
<span class="late">متأخرة</span>
</div>

<div class="card" onclick="selectStatus(this,'present')">
<div class="emoji">✅</div>
<span class="present">حاضرة</span>
</div>

<div class="card" onclick="selectStatus(this,'early')">
<div class="emoji">🌟</div>
<span class="early">مبكرة</span>
</div>

</div>

<div class="nav">
<button class="back" onclick="goBack()">السابق</button>
<button class="next" onclick="goNext()">التالي</button>
</div>

</div>

<!-- ================= JS ================= -->
<script>

let selected=null;

/* عرض اسم الطالبة */
window.onload=function(){
let name=localStorage.getItem("studentName");
document.getElementById("welcomeText").innerText=
name?"مرحبًا يا "+name+" 👋":"مرحبًا بكِ 👋";
};

/* اختيار الحضور */
function selectStatus(element,type){

document.querySelectorAll(".card")
.forEach(card=>card.classList.remove("active"));

element.classList.add("active");

selected=type;

/* Firebase */
let name=localStorage.getItem("studentName")||"طالبة";
let safeName=name.replace(/[.#$\[\]]/g,"_");

firebase.database().ref("students/"+safeName).update({
attendanceStatus:type,
lastSeen:new Date().toLocaleTimeString()
});

}

/* التالي */
function goNext(){
if(!selected){
alert("اختاري حالة الحضور أولاً");
return;
}
window.location.href="late-reason.html";
}

/* السابق */
function goBack(){
window.location.href="intintion.html";
}

</script>

</body>
