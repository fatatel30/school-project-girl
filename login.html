<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4b0082,#1e3c72);
    color:white;
}

.container{
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    text-align:center;
    backdrop-filter:blur(10px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    position:relative;
}

.emoji{
    font-size:80px;
    margin-bottom:10px;
    animation:float 2s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0);}
}

h2{
    margin-bottom:20px;
    color:#ffd700;
}

.bubble{
    position:absolute;
    top:-5px;
    right:50%;
    transform:translateX(50%);
    background:#e63946;
    color:white;
    padding:8px 15px;
    border-radius:20px;
    display:none;
    font-weight:bold;
}

input{
    width:100%;
    padding:14px;
    border-radius:25px;
    border:none;
    margin-bottom:20px;
    font-size:16px;
    text-align:center;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:25px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-bottom:10px;
}

#loginBtn{
    background:#ffd700;
    color:#4b0082;
}

button.error{
    background:#e63946 !important;
    color:white;
}

button.success{
    background:#2ecc71 !important;
    color:white;
}

.back-btn{
    background:#d8b4fe;
    color:#4b0082;
}

button:hover{
    transform:scale(1.05);
}
</style>

<!-- ✅ Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDL5aF9Jos192Bb1lJq25xbTrF9EcZ-XSQ",
  authDomain: "school-project-girl.firebaseapp.com",
  databaseURL: "https://school-project-girl-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "school-project-girl",
  storageBucket: "school-project-girl.firebasestorage.app",
  messagingSenderId: "60130160811",
  appId: "1:60130160811:web:e37db48f546fa10895c7ee"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
</script>

</head>

<body>

<div class="container">

<div class="bubble" id="bubble">ادخلي اسمك أولاً</div>

<div class="emoji">👩‍🎓</div>
<h2>🌙 أهلاً بكِ</h2>

<input type="text" id="studentName" placeholder="اكتبي اسم الطالبة">

<button id="loginBtn" onclick="loginStudent()">دخول ✅</button>
<button class="back-btn" onclick="goBack()">⬅ رجوع</button>

</div>

<script>

function loginStudent(){

let name=document.getElementById("studentName").value.trim();
let bubble=document.getElementById("bubble");
let btn=document.getElementById("loginBtn");

btn.classList.remove("error","success");

if(name===""){

bubble.style.display="block";
btn.classList.add("error");

setTimeout(()=>{
bubble.style.display="none";
btn.classList.remove("error");
},2000);

return;
}

/* ✅ نجاح */
btn.classList.add("success");

/* حفظ محلي */
localStorage.setItem("studentName",name);

/* ✅ حفظ في Firebase */
database.ref("students").push({
name:name,
time:new Date().toLocaleString()
});

/* انتقال */
setTimeout(()=>{
window.location.href="welcome.html";
},700);

}

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
