<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4b0082,#1e3c72);
color:white;
}

.container{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:20px;
width:90%;
max-width:400px;
text-align:center;
backdrop-filter:blur(10px);
position:relative;
}

/* حركة الإيموجي */
.emoji{
font-size:80px;
margin-bottom:10px;
animation:float 2s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0);}
}

h2{
margin-bottom:20px;
color:#ffd700;
}

.bubble{
position:absolute;
top:-5px;
right:50%;
transform:translateX(50%);
background:#e63946;
padding:8px 15px;
border-radius:20px;
display:none;
font-weight:bold;
}

input{
width:100%;
padding:14px;
border-radius:25px;
border:none;
margin-bottom:20px;
text-align:center;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:25px;
font-size:17px;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
transition:.3s;
}

#loginBtn{
background:#ffd700;
color:#4b0082;
}

.back-btn{
background:#d8b4fe;
color:#4b0082;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<div id="bubble" class="bubble">
ادخلي اسمك أولاً
</div>

<div class="emoji">👩‍🎓</div>
<h2>🌙 أهلاً بكِ</h2>

<input type="text"
id="studentName"
placeholder="ادخلي اسمك بالكامل">

<button id="loginBtn" onclick="login()">دخول</button>

<button class="back-btn" onclick="goBack()">رجوع</button>

</div>

<script>

function login(){

let name =
document.getElementById("studentName").value.trim();

let bubble =
document.getElementById("bubble");

/* لو الاسم فاضي */
if(name===""){
bubble.style.display="block";

setTimeout(()=>{
bubble.style.display="none";
},2000);

return;
}

/* حفظ الاسم */
localStorage.setItem("currentStudent",name);

/* الانتقال لصفحة الترحيب */
window.location.href="welcome.html";
}

/* الرجوع للصفحة الرئيسية */
function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
