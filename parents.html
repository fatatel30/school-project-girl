<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ركن أولياء الأمور</title>

<style>

body{
margin:0;
font-family:Tahoma, Arial;
background:linear-gradient(180deg,#5b2ca0,#2d3f8f);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#fff;
}

.container{
width:90%;
max-width:400px;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
text-align:center;
}

.family{
font-size:55px;
margin-bottom:5px;
}

h2{
color:#ffd700;
margin:5px 0;
}

.text-box{
background:#7b4bc4;
padding:15px;
border-radius:12px;
margin-bottom:15px;
font-size:14px;
line-height:1.6;
}

.form-box{
background:#6a3eb3;
padding:15px;
border-radius:12px;
text-align:right;
}

label{
display:block;
text-align:right;
margin-bottom:5px;
font-weight:bold;
}

input[type="text"]{
width:100%;
padding:10px;
border-radius:8px;
border:2px solid #ffd700;
margin:8px 0;
outline:none;
box-sizing:border-box;
}

.checkbox{
font-size:14px;
margin:10px 0;
text-align:right;
}

button{
padding:12px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

/* زر التأكيد */
.confirm{
background:#28c76f;
color:#fff;
width:100%;
}

.confirm:active{
background:#1fa85b;
box-shadow:0 0 10px #28c76f;
}

/* أزرار التنقل */
.nav-buttons{
display:flex;
justify-content:space-between;
margin-top:15px;
}

/* السابق */
.prev{
background:#9c27b0;
color:#fff;
width:45%;
}

/* التالي */
.next{
background:#f4b400;
color:#000;
width:45%;
}

.prev:active,
.next:active{
box-shadow:0 0 12px #fff;
transform:scale(0.95);
}

</style>
  <!-- مكتبات Firebase الأساسية -->
<script src="https://www.gstatic.com"></script>
<script src="https://www.gstatic.com"></script>

<script>
// إعدادات مشروعك الخاصة (نفس التي في صفحة Login)

};

// تفعيل الفايربيز إذا لم يكن مفعلاً
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const database = firebase.database();

// وظيفة مساعدة لتنظيف الأسماء من الرموز الممنوعة في فايربيز
function getSafeName() {
    let name = localStorage.getItem("studentName") || "guest";
    return name.replace(/[.#$\[\]]/g, "_");

</head>

<body>

<div class="container">

<div class="family">👨‍👩‍👧</div>

<h2>ركن أولياء الأمور</h2>

<div style="font-size:14px;margin-bottom:15px;">
شراكة تربوية لدعم الانضباط
</div>

<div class="text-box">
📜 <b>إقرار اطلاع</b><br>
أقرّ بأني اطلعت على مبادرة وقيم أمانة الانضباط،
وأتعهد بدعم ابنتي في الالتزام بالحضور المبكر خلال شهر رمضان المبارك.
</div>

<div class="form-box">

<label>اسم ولي الأمر</label>
<input type="text" id="parentName" placeholder="أدخل اسمك هنا">

<div class="checkbox">
<input type="checkbox" id="agree">
أتعهد بدعم ابنتي في الانضباط الرمضاني
</div>

<button class="confirm" onclick="confirmForm()">✔ تأكيد التعهد</button>

</div>

<div class="nav-buttons">
<button class="prev" onclick="goPrev()">السابق</button>
<button class="next" onclick="goNext()">التالي</button>
</div>

</div>

<script>

function confirmForm(){
var name=document.getElementById("parentName").value;
var agree=document.getElementById("agree").checked;

if(name===""||!agree){
alert("من فضلك اكتب الاسم وحدد التعهد");
}else{
alert("تم تأكيد التعهد بنجاح ✅");
}
}
let student = localStorage.getItem("studentName");
firebase.database().ref("students/" + student).update({
    parentName: name,
    parentAgreement: agree
});

/* ✅ الصفحة التالية */
function goNext(){
window.location.href="certificate.html";
}

/* ✅ الصفحة السابقة */
function goPrev(){
window.location.href="student-states.html";
}

</script>

</body>

</html>
