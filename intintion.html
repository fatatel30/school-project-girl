<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نية اليوم</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo', sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#6b21a8,#1e3a8a);
    display:flex;
    justify-content:center;
    padding:30px 15px;
    color:white;
}

.container{
    width:100%;
    max-width:420px;
}

.success-message{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#00c853;
    color:white;
    padding:12px 20px;
    border-radius:25px;
    font-size:14px;
    box-shadow:0 0 15px #00ff88;
    display:none;
    z-index:1000;
}

/* ✅ الفقاعة المضافة فقط */
.warning-bubble{
    position:fixed;
    bottom:95px;
    left:50%;
    transform:translateX(-50%);
    background:#9333ea;
    color:white;
    padding:10px 18px;
    border-radius:20px;
    font-size:14px;
    display:none;
    z-index:2000;
    animation:fadeUp .3s ease;
}

.warning-bubble::after{
    content:"";
    position:absolute;
    top:100%;
    left:50%;
    transform:translateX(-50%);
    border-width:8px;
    border-style:solid;
    border-color:#9333ea transparent transparent transparent;
}

@keyframes fadeUp{
from{opacity:0;transform:translate(-50%,10px);}
to{opacity:1;transform:translate(-50%,0);}
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.top-emoji{
    font-size:45px;
    margin-bottom:8px;
}

.header h1{
    color:#facc15;
    font-size:22px;
}

.header p{
    font-size:14px;
    opacity:0.9;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:18px;
    border-radius:20px;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    gap:15px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    background:rgba(255,255,255,0.15);
}

.card.active{
    background:#7e22ce;
    box-shadow:0 0 20px #c084fc;
}

.card-text h3{
    color:#facc15;
    font-size:16px;
    margin-bottom:5px;
}

.card-text p{
    font-size:13px;
    opacity:0.85;
}

.card-icon{
    font-size:26px;
}

.buttons{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    gap:10px;
}

button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:25px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
}

.arrow{
    font-size:18px;
}

.next-btn{
    background:#facc15;
    color:#4b0082;
}

.save-btn{
    background:#2a9d8f;
    color:white;
    transition:0.3s;
    opacity:0.6;
}

.save-btn.active{
    background:#00c853;
    box-shadow:0 0 15px #00ff88;
    opacity:1;
}

.back-btn{
    background:#9333ea;
    color:white;
}
</style>
    <!-- مكتبات Firebase الأساسية -->
<script src="https://www.gstatic.com"></script>
<script src="https://www.gstatic.com"></script>

// وظيفة مساعدة لتنظيف الأسماء من الرموز الممنوعة في فايربيز

</head>

<body>

<div class="success-message" id="successMsg">
تم حفظ نيتك بنجاح 🌙
</div>

<!-- ✅ الفقاعة -->
<div class="warning-bubble" id="warningBubble">
اختاري نيتك أولاً
</div>

<div class="container">

<div class="header">
<div class="top-emoji">🤲</div>
<h1>نية اليوم</h1>
<p>اختاري نيتك للانضباط اليوم</p>
</div>

<div class="card" onclick="selectIntention(this,'البكور بركة')">
<div class="card-icon">🌅</div>
<div class="card-text">
<h3>البكور بركة</h3>
<p>سأحضر مبكرة لأبدأ يومي ببركة</p>
</div>
</div>

<div class="card" onclick="selectIntention(this,'احترام الوقت')">
<div class="card-icon">⏰</div>
<div class="card-text">
<h3>احترام الوقت</h3>
<p>ألتزم بأوقاتي احتراماً لمعلماتي</p>
</div>
</div>

<div class="card" onclick="selectIntention(this,'نوم مبكر')">
<div class="card-icon">😴</div>
<div class="card-text">
<h3>نوم مبكر</h3>
<p>سأنام مبكرة لأستيقظ نشيطة</p>
</div>
</div>

<div class="card" onclick="selectIntention(this,'التميز الرمضاني')">
<div class="card-icon">🏆</div>
<div class="card-text">
<h3>التميز الرمضاني</h3>
<p>سأجعل رمضان فرصة للتميز</p>
</div>
</div>

<div class="buttons">
<button class="back-btn" onclick="goBack()">
السابق <span class="arrow">➡</span>
</button>

<button class="save-btn" onclick="saveIntention()">💾 حفظ النية</button>

<button class="next-btn" onclick="nextPage()">
<span class="arrow">⬅</span> التالي
</button>
</div>

</div>

<script>
let selectedIntention = "";

function selectIntention(element,value){
selectedIntention=value;

document.querySelectorAll(".card").forEach(card=>{
card.classList.remove("active");
});

element.classList.add("active");
document.querySelector(".save-btn").classList.add("active");
}

function saveIntention(){
if(selectedIntention===""){
alert("اختاري نيتك أولاً");
return;
}

let students=JSON.parse(localStorage.getItem("students"))||{};
let current=localStorage.getItem("currentStudent");

if(students[current]){
students[current].todayIntention=selectedIntention;
localStorage.setItem("students",JSON.stringify(students));
}

let msg=document.getElementById("successMsg");
msg.style.display="block";

setTimeout(()=>{
msg.style.display="none";
},3000);
}

/* ✅ التعديل الوحيد */
function nextPage(){

if(selectedIntention===""){
let bubble=document.getElementById("warningBubble");
bubble.style.display="block";

setTimeout(()=>{
bubble.style.display="none";
},2000);

return;
}

window.location.href="attendance.html";
}

function goBack(){
window.location.href="welcome.html";
}
</script>

</body>

</html>
